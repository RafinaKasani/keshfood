<style amp-custom>
    html {

    body {

      background-image: url("https://bmw777.sgp1.cdn.digitaloceanspaces.com/Logo/kesh-foods/kesh.webp");
      
      /* Mengatur agar gambar memenuhi seluruh layar */

      background-attachment: fixed;
      
      /* Mengatur posisi gambar tepat di tengah */

      justify-content: center;
      align-items: center;

      margin: 0;
      padding: 15px 0;
      box-sizing: border-box;
    }

    /* Konten wrapper bertema Biru Mewah dengan transparansi premium */
    .content-wrapper {
      background: rgba(6, 14, 30, 0.75); /* Deep sapphire semi-transparan */
      backdrop-filter: blur(10px);        /* Efek blur kaca premium */
      border: 1px solid rgba(30, 144, 255, 0.4); /* Bingkai royal blue tipis */
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 40px 0 rgba(0, 8, 20, 0.9);
      text-align: center;

    .flip-button {
      padding: 10px 20px;
      font-size: 16px;
      font-family: 'Matrix Regular Small Caps', sans-serif;
      background: linear-gradient(
        135deg,
        #030914 0%,
        #0a1d37 40%,
        #0e294b 50%,
        #0a1d37 60%,
        #030914 100%
      );
      border: 2px solid #4169e1; /* Menggunakan Royal Blue */
      border-radius: 8px;
      cursor: pointer;
      color: rgb(255, 255, 255);
      box-shadow: 0 4px 15px rgba(65, 105, 225, 0.3);
      margin-bottom: -28px;
      position: relative;
      z-index: 20;
      transition: all 0.3s ease;
    }

    .flip-button:hover {
      border-color: #1e90ff;
      box-shadow: 0 4px 20px rgba(30, 144, 255, 0.6);
    }

    .card-scene {
      width: 470px;
      perspective: 1200px;
      margin: 50px 0;
      position: relative;
      z-index: 10;
    }

    .card-flipper {
      position: relative;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .card-flipper.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face-front {
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .card-face-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: rotateY(180deg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 50px rgba(0, 5, 15, 0.85);
      box-sizing: border-box;
      /* Gradasi kosmik Safir Mewah ke Biru Royal */
      background: linear-gradient(270deg, #050f26 0%, #1e90ff 21%, #0b1736 33%, #10224d 44%, #2e59c2 60%, #0a183a 73%, #1e90ff 85%, #05102a 100%);
      padding: 12px;
      display: block;
    }

    .card-face-back amp-img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    .ygo-card-container {
      width: 100%;
      padding: 14px;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      background:
        radial-gradient(circle at top left,
        rgba(30, 144, 255, 0.3) 0%,
        transparent 40%),
        linear-gradient(
        135deg,
        #020612 0%,
        #061329 35%,
        #0d2347 70%,
        #020612 100%
      );
      animation: galaxyPulse 2s infinite;
      border: 1px solid rgba(30, 144, 255, 0.4);
      box-shadow:
        0 10px 30px rgba(0,0,0,.5),
        inset 0 1px 1px rgba(255,255,255,.1);
    }

    /* Glow kosmik mewah di sudut */
    .ygo-card-container::after {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 180px;
      height: 180px;
      background: radial-gradient(
          circle,
          rgba(65, 105, 225, 0.4),
          transparent 70%
      );
      pointer-events: none;
    }

    /* Efek pantulan cahaya safir */
    .ygo-card-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
          90deg,
          transparent,
          rgba(30, 144, 255, 0.3),
          transparent
      );
      transform: skewX(-25deg);
      animation: shine 5s infinite;
    }

    @keyframes shine {
      0% { left: -150%; }
      30% { left: 150%; }
      100% { left: 150%; }
    }

    @keyframes galaxyPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(30, 144, 255, 0.35); }
      50% { box-shadow: 0 0 28px rgba(30, 144, 255, 0.75); }
    }

    .ygo-card-inner {
      background: #040a17;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e90ff;
      position: relative;
      z-index: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #08162e;
      padding: 10px 15px;
      border-bottom: 2px solid #102a54;
      box-shadow: inset 0 2px 2px rgba(30, 144, 255, 0.5), inset 0 -2px 3px rgba(0, 0, 0, 0.5);
    }

    .card-name {
      font-family: 'Matrix Regular Small Caps', sans-serif;
      font-size: 28px;
      background: linear-gradient(120deg, #5588f8 30%, #ffffff 50%, #4d7ce0 70%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
      letter-spacing: 1px;
      animation: shine 3s linear infinite;
    }

    .card-attribute {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #f0f7ff, #1e90ff);
      border: 2px solid #ffffff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial Black', sans-serif;
      font-size: 18px;
      color: #020714;
      text-shadow: 1px 1px 1px white;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.7), 0 0 6px rgba(30, 144, 255, 0.8);
      flex-shrink: 0;
    }

    .card-level {
      background: #08162e;
      padding: 5px 15px 8px 15px;
      box-shadow: inset 0 2px 2px rgba(30, 144, 255, 0.4), inset 0 -2px 3px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .star {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle at 50% 30%, #1e90ff, #001133 70%);
      border-radius: 50%;
      margin-left: 3px;
      filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.7));
      position: relative;
    }

    .star::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 40% 30%, #dcdcdc, #4169e1 70%);
      clip-path: polygon(50% 0%, 65% 40%, 100% 40%, 75% 65%, 85% 100%, 50% 80%, 15% 100%, 25% 65%, 0% 40%, 35% 40%);
      transform: scale(0.9);
    }

    .rating-count {
      font-family: 'Matrix Regular Small Caps', sans-serif;
      font-size: 16px;
      font-weight: bold;
      color: #add8e6;
      margin-left: 10px;
      padding: 3px 10px;
      border: 1px solid #1e90ff;
      border-radius: 50px;
      background: rgba(4, 12, 32, 0.7);
      box-shadow: inset 0 0 10px rgba(30, 144, 255, 0.4);
      animation: ratingPulse 1.5s infinite ease-in-out;
    }

    @keyframes ratingPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px #1e90ff; }
      50% { opacity: 0.6; box-shadow: 0 0 18px #1e90ff; }
    }

    .card-image-box {
      padding: 8px;
      background: linear-gradient(135deg, #061124, #020610);
      position: relative;
      overflow: hidden;
    }

    /* Efek kilau garis jalan berwarna biru mewah */
    .card-image-box::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        120deg,
        transparent 40%,
        #4169e1,
        transparent 60%
      );
      transform: rotate(25deg);
      animation: shineMove 2s linear infinite;
    }

    @keyframes shineMove {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    .card-image-placeholder {

    .card-cta-button {

      font-weight: bold;

      position: relative;
      overflow: hidden;
      animation: goldFlow 3s infinite linear, buttonPulse 2s infinite;
      transition: all 0.3s ease;
    }

    @keyframes goldFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes buttonPulse {
      0% { transform: scale(1); box-shadow: 0 0 12px rgba(30, 144, 255, 0.4); }
      50% { transform: scale(1.03); box-shadow: 0 0 28px rgba(30, 144, 255, 0.8); }
      100% { transform: scale(1); box-shadow: 0 0 12px rgba(30, 144, 255, 0.4); }
    }

    .card-cta-button:hover {
      background: #ffffff;
      color: #051126;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7), 0 0 35px #1e90ff;
      letter-spacing: 2px;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 10px 15px;
      background: #051124;
      border-top: 2px solid #1e90ff;
      padding-right: 50px;
      box-shadow: inset 0 2px 2px rgba(30, 144, 255, 0.5), inset 0 -2px 3px rgba(0, 0, 0, 0.5);
    }

    .stats {
      font-family: 'Matrix Regular Small Caps', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(30, 144, 255, 0.7);
      margin-left: 25px;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
        align-items: center;
        min-height: auto;
      }

      .flip-button {
        margin-top: 5px;
        margin-bottom: 2px;
      }

      .card-scene {
        width: 100%;
        margin: 15px 0;
      }

      .ygo-card-container {
        width: 100%;
        padding: 8px;
        margin: 0;
      }

      .card-face-back {
        padding: 8px;
      }

      .card-face-back amp-img {
        border-radius: 10px;
      }

      .card-name {
        font-size: 22px;
      }

      .card-attribute {
        width: 35px;
        height: 35px;
        font-size: 16px;
      }

      .star {
        width: 16px;
        height: 16px;
        margin-left: 2px;
      }

      .rating-count {
        font-size: 14px;
        margin-left: 5px;
      }

      .card-image-box {
        padding: 5px;
      }

      .card-description {
        font-size: 14px;
      }

      .card-body {
        padding: 12px;
      }

      .card-cta-button {
        font-size: 16px;
        padding: 10px;
        width: 90%;
      }

      .stats {
        font-size: 16px;
        margin-left: 15px;
      }

      .card-footer {
        padding-right: 40px;
      }
    }

    /* Container Splash Screen */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #020612; /* Warna deep space mewah */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      animation: fadeOutSplash 0.5s ease-in-out 1s forwards;
      pointer-events: none;
    }

    /* Ukuran Logo */
    .splash-logo {
      max-width: 150px;
      height: auto;
      animation: scaleUp 0.5s ease-out;
    }

    @keyframes fadeOutSplash {
      0% { opacity: 1; visibility: visible; }
      99% { opacity: 0; visibility: visible; }
      100% { opacity: 0; visibility: hidden; display: none; }
    }

    @keyframes scaleUp {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
